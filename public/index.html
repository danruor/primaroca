<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Constructora — Gestión de obra</title>
  <meta name="description" content="Cotizador, proyectos y catálogo de precios de materiales para tu constructora." />

  <!-- PWA / iOS -->
  <meta name="theme-color" content="#232a32" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Constructora" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />

  <!-- Tipografías -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M2 18h20" />
            <path d="M4 18v-2a8 8 0 0 1 16 0v2" />
            <path d="M12 5V3" />
            <path d="M10 3h4" />
            <path d="M12 5a6 6 0 0 0-6 6" />
          </svg>
        </div>
        <div class="name"><span id="brand-name">Constructora</span><small>Gestión de obra</small></div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="sidebar-foot">
        <span class="dot" id="status-dot"></span>
        <span id="status-text">En línea</span>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="eyebrow" id="page-eyebrow">Panel general</div>
        <h1 id="page-title">Dashboard</h1>
        <div class="actions" id="page-actions"></div>
      </header>
      <section class="content" id="content"></section>
    </main>

    <nav class="tabbar" id="tabbar"></nav>
  </div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
